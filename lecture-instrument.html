<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lire un instrument de mesure - Métrologie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .digital-font { font-family: 'Share Tech Mono', monospace; }
        canvas { touch-action: none; background: linear-gradient(180deg, #ffffff 0%, #f1f5f9 100%); border-radius: 0.5rem; box-shadow: inset 0 2px 4px 0 rgb(0 0 0 / 0.05); }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; }
        .instrument-btn.active { background-color: #3b82f6; color: white; border-color: #3b82f6; }
        
        /* Custom scrollbar for instrument list */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-slate-800 h-screen flex flex-col overflow-hidden">

    <header class="bg-slate-900 text-white shadow-md z-10 relative">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fas fa-ruler-combined text-blue-400 text-2xl"></i>
                <h1 class="font-bold text-xl tracking-tight">Métrologie<span class="text-blue-400">Lab</span></h1>
            </div>
            <div class="flex items-center gap-4 bg-slate-800 p-1 rounded-lg border border-slate-700">
                <button id="mode-training" class="px-4 py-1.5 rounded-md text-sm font-medium transition-colors bg-blue-500 text-white" onclick="app.setMode('training')">
                    <i class="fas fa-graduation-cap mr-2"></i>Entraînement
                </button>
                <button id="mode-evaluation" class="px-4 py-1.5 rounded-md text-sm font-medium text-slate-300 hover:text-white transition-colors" onclick="app.setMode('evaluation')">
                    <i class="fas fa-stopwatch mr-2"></i>Évaluation
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden max-w-7xl mx-auto w-full">
        
        <!-- Sidebar: Instruments -->
        <aside class="w-64 bg-white border-r border-slate-200 flex flex-col h-full z-10 shadow-[4px_0_24px_rgba(0,0,0,0.02)]">
            <div class="p-4 border-b border-slate-100 bg-slate-50">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Instruments de mesure</h2>
                <p class="text-xs text-slate-500">Sélectionnez pour pratiquer</p>
            </div>
            <div id="instrument-list" class="flex-1 overflow-y-auto p-3 space-y-2">
                <!-- Instrument buttons populated by JS -->
            </div>
        </aside>

        <!-- Main Content Area -->
        <section class="flex-1 flex flex-col h-full bg-slate-50 overflow-y-auto relative">
            
            <!-- Context & Canvas -->
            <div class="p-6 flex-1 flex flex-col">
                <div class="mb-4 flex justify-between items-end">
                    <div>
                        <h2 id="current-instrument-title" class="text-2xl font-bold text-slate-800">Pied à coulisse à vernier</h2>
                        <p id="current-instrument-desc" class="text-slate-500 text-sm mt-1">Lisez la valeur indiquée par l'instrument.</p>
                    </div>
                    <div id="eval-score-container" class="hidden text-right">
                        <div class="text-sm font-semibold text-slate-500 uppercase">Score Actuel</div>
                        <div class="text-2xl font-bold text-blue-600" id="eval-score">0 / 10</div>
                    </div>
                </div>

                <div class="relative w-full aspect-[21/9] min-h-[300px] border border-slate-200 rounded-xl overflow-hidden shadow-sm bg-white mb-6">
                    <canvas id="render-canvas" class="w-full h-full block"></canvas>
                    
                    <!-- Contextual Overlays (Dirt, Zero error hint) -->
                    <div id="canvas-overlay" class="absolute top-4 right-4 max-w-xs pointer-events-none"></div>
                    
                    <!-- Zoom Control -->
                    <div class="absolute bottom-4 right-4 flex gap-2">
                        <button onclick="app.generateNewMeasurement()" class="bg-white/80 backdrop-blur border border-slate-200 shadow-sm text-slate-600 hover:text-blue-600 p-2 rounded-lg transition-colors tooltip" title="Générer une nouvelle mesure">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                    </div>
                </div>

                <!-- Input Controls -->
                <div class="glass-panel rounded-xl p-6 shadow-sm border border-slate-200 flex flex-wrap gap-6 items-end">
                    
                    <div class="flex-1 min-w-[200px]">
                        <label class="block text-sm font-medium text-slate-700 mb-2">Valeur lue</label>
                        <div class="relative">
                            <input type="number" id="input-value" step="0.001" class="block w-full rounded-lg border-slate-300 shadow-sm border p-3 text-lg focus:ring-blue-500 focus:border-blue-500 transition-colors" placeholder="Ex: 12.34">
                            <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-slate-400">
                                <i class="fas fa-keyboard"></i>
                            </div>
                        </div>
                    </div>

                    <div class="w-32">
                        <label class="block text-sm font-medium text-slate-700 mb-2">Unité</label>
                        <select id="input-unit" class="block w-full rounded-lg border-slate-300 shadow-sm border p-3 bg-white focus:ring-blue-500 focus:border-blue-500">
                            <option value="mm">mm</option>
                            <option value="deg">Degrés (°)</option>
                        </select>
                    </div>

                    <div class="w-40">
                        <label class="block text-sm font-medium text-slate-700 mb-2">Résolution</label>
                        <select id="input-resolution" class="block w-full rounded-lg border-slate-300 shadow-sm border p-3 bg-white focus:ring-blue-500 focus:border-blue-500">
                            <!-- Populated dynamically -->
                        </select>
                    </div>

                    <div class="w-48">
                        <label class="block text-sm font-medium text-slate-700 mb-2">Erreur constatée</label>
                        <select id="input-error" class="block w-full rounded-lg border-slate-300 shadow-sm border p-3 bg-white focus:ring-blue-500 focus:border-blue-500">
                            <option value="none">Aucune</option>
                            <option value="dirt">Saleté (Lecture masquée)</option>
                            <option value="parallax">Erreur de parallaxe</option>
                        </select>
                    </div>

                    <button id="btn-validate" onclick="app.validateAnswer()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-lg shadow-md shadow-blue-500/30 transition-all transform hover:-translate-y-0.5">
                        Valider
                    </button>
                </div>

                <!-- Feedback Panel (Hidden initially) -->
                <div id="feedback-panel" class="hidden mt-6 p-6 rounded-xl border transition-all duration-300">
                    <div class="flex items-start gap-4">
                        <div id="feedback-icon" class="w-12 h-12 rounded-full flex items-center justify-center text-2xl flex-shrink-0">
                            <!-- Icon injected via JS -->
                        </div>
                        <div class="flex-1">
                            <h3 id="feedback-title" class="text-lg font-bold mb-1">Résultat</h3>
                            <p id="feedback-message" class="text-slate-600 mb-4">Message explicatif ici.</p>
                            
                            <div id="detailed-correction" class="hidden bg-white/50 rounded-lg p-4 text-sm space-y-2 border border-slate-200/50">
                                <!-- Correction steps -->
                            </div>
                        </div>
                        <button id="btn-next" onclick="app.nextStep()" class="hidden bg-slate-800 hover:bg-slate-900 text-white py-2 px-6 rounded-lg shadow transition-colors whitespace-nowrap">
                            Question Suivante <i class="fas fa-arrow-right ml-2"></i>
                        </button>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <script>
        /**
         * ENGINE: Rendering & Metrology Logic
         */
        
        // Configuration des instruments
        const INSTRUMENTS = {
            vernier: {
                id: 'vernier', name: 'Pied à coulisse (Vernier)', desc: 'Lecture de la règle principale puis du vernier.',
                units: ['mm'], resolutions: [0.02, 0.05], errors: ['none', 'dirt', 'parallax'], range: [5, 120]
            },
            digital_caliper: {
                id: 'digital_caliper', name: 'Pied à coulisse num.', desc: 'Lecture directe sur l\'écran digital.',
                units: ['mm'], resolutions: [0.01], errors: ['none'], range: [5, 150]
            },
            micrometer: {
                id: 'micrometer', name: 'Micromètre', desc: 'Lecture sur la douille (0.5mm) et le tambour (0.01mm).',
                units: ['mm'], resolutions: [0.01], errors: ['none', 'parallax'], range: [2, 22]
            },
            dial: {
                id: 'dial', name: 'Comparateur', desc: 'Lecture du cadran totalisateur (mm) et du grand cadran.',
                units: ['mm'], resolutions: [0.01], errors: ['none', 'parallax'], range: [0, 9]
            },
            protractor: {
                id: 'protractor', name: 'Rapporteur d\'angle', desc: 'Lecture des degrés puis du vernier en minutes.',
                units: ['deg'], resolutions: [1/12], // 1/12 de degré = 5 minutes
                errors: ['none', 'parallax', 'dirt'], range: [10, 170]
            },
            gauges: {
                id: 'gauges', name: 'Jauges d\'épaisseur', desc: 'Lecture directe de la valeur gravée sur la lame.',
                units: ['mm'], resolutions: [0.05, 0.02], errors: ['none', 'dirt'], range: [0.05, 1.00]
            },
            blocks: {
                id: 'blocks', name: 'Cales étalons', desc: 'Somme des valeurs des cales empilées.',
                units: ['mm'], resolutions: [0.001], errors: ['none', 'dirt'], range: [10, 50]
            }
        };

        const state = {
            mode: 'training', // 'training' | 'evaluation'
            currentInst: 'vernier',
            evalScore: 0,
            evalCurrentQ: 0,
            evalMaxQ: 10,
            
            // Current Measurement Context
            targetValue: 0,
            resolution: 0.02,
            unit: 'mm',
            errorMode: 'none',
            
            showCorrectionOverlay: false
        };

        // UI References
        const canvas = document.getElementById('render-canvas');
        const ctx = canvas.getContext('2d');
        let animationFrame;

        // Resize handler for crisp canvas
        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            // High DPI support
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            if(app) app.render();
        }
        window.addEventListener('resize', resizeCanvas);

        class RenderEngine {
            constructor(context, width, height) {
                this.ctx = context;
                this.w = width;
                this.h = height;
            }

            clear() {
                this.ctx.clearRect(0, 0, this.w, this.h);
            }

            drawMetallicBackground(x, y, w, h, radius = 0) {
                const grad = this.ctx.createLinearGradient(x, y, x, y + h);
                grad.addColorStop(0, '#f1f5f9');
                grad.addColorStop(0.5, '#cbd5e1');
                grad.addColorStop(1, '#94a3b8');
                
                this.ctx.fillStyle = grad;
                this.ctx.shadowColor = 'rgba(0,0,0,0.1)';
                this.ctx.shadowBlur = 10;
                this.ctx.shadowOffsetY = 5;
                
                this.ctx.beginPath();
                this.ctx.roundRect(x, y, w, h, radius);
                this.ctx.fill();
                
                // Reset shadow
                this.ctx.shadowColor = 'transparent';
                this.ctx.shadowBlur = 0;
                this.ctx.shadowOffsetY = 0;
                
                this.ctx.strokeStyle = '#64748b';
                this.ctx.lineWidth = 1;
                this.ctx.stroke();
            }

            drawLine(x1, y1, x2, y2, color = '#1e293b', width = 1) {
                this.ctx.beginPath();
                this.ctx.moveTo(x1, y1);
                this.ctx.lineTo(x2, y2);
                this.ctx.strokeStyle = color;
                this.ctx.lineWidth = width;
                this.ctx.stroke();
            }

            drawText(text, x, y, font = "14px Inter", color = "#1e293b", align = "center") {
                this.ctx.font = font;
                this.ctx.fillStyle = color;
                this.ctx.textAlign = align;
                this.ctx.textBaseline = "middle";
                this.ctx.fillText(text, x, y);
            }

            renderVernier(value, resolution, showCorrection) {
                const scale = 20; // px per mm
                const startX = 100;
                const rulerY = this.h / 2 - 20;
                
                // Determine view window (zoom on measurement)
                const viewStartMm = Math.max(0, Math.floor(value) - 10);
                
                // Règle principale (Main Scale)
                this.drawMetallicBackground(10, rulerY - 60, this.w - 20, 60, 5);
                
                // Règle Ticks
                for(let i = viewStartMm; i < viewStartMm + 60; i++) {
                    const x = startX + (i - viewStartMm) * scale;
                    if(x > this.w) break;
                    
                    let h = 15;
                    if(i % 10 === 0) {
                        h = 30;
                        this.drawText(i, x, rulerY - 45, "bold 14px Inter");
                    } else if (i % 5 === 0) {
                        h = 22;
                    }
                    this.drawLine(x, rulerY, x, rulerY - h, '#000', i%10===0?1.5:1);

                    // Correction: Highlight main scale tick
                    if (showCorrection && i === Math.floor(value)) {
                        this.drawLine(x, rulerY, x, rulerY - h - 10, '#ef4444', 2);
                    }
                }

                // Vernier Slider
                const vernierX = startX + (value - viewStartMm) * scale;
                
                this.ctx.save();
                if (state.errorMode === 'parallax') {
                    // Ombre très décalée pour simuler une vue de biais
                    this.ctx.shadowColor = 'rgba(0,0,0,0.5)';
                    this.ctx.shadowBlur = 6;
                    this.ctx.shadowOffsetX = -15; 
                    this.ctx.shadowOffsetY = 4;
                }
                this.drawMetallicBackground(vernierX - 40, rulerY, this.w - vernierX + 30, 80, [0,0,5,5]);
                this.ctx.restore();
                
                this.drawLine(vernierX-40, rulerY, this.w, rulerY, '#475569', 2); // Junction

                // Vernier Ticks
                const divs = resolution === 0.02 ? 50 : 20;
                const span = resolution === 0.02 ? 49 : 19;
                const tickSpacing = (span / divs) * scale;
                const matchTickIndex = Math.round((value % 1) / resolution);

                for(let i = 0; i <= divs; i++) {
                    const x = vernierX + i * tickSpacing;
                    let h = 15;
                    if(i % 10 === 0) {
                        h = 30;
                        this.drawText((i * resolution * 100 / 10).toString(), x, rulerY + 45, "bold 12px Inter");
                    } else if (i % 5 === 0 && resolution === 0.02) {
                        h = 22;
                    }
                    this.drawLine(x, rulerY, x, rulerY + h, '#000', i%10===0?1.5:1);

                    // Correction Highlight
                    if (showCorrection && i === matchTickIndex) {
                        this.drawLine(x, rulerY - 15, x, rulerY + h + 10, '#22c55e', 2);
                        // Draw connection
                        this.ctx.globalAlpha = 0.2;
                        this.ctx.fillStyle = '#22c55e';
                        this.ctx.fillRect(x-1, rulerY-40, 2, 80);
                        this.ctx.globalAlpha = 1;
                    }
                }

                if (state.errorMode === 'dirt') {
                    const alignedX = vernierX + matchTickIndex * tickSpacing;
                    this.drawDirt(alignedX, rulerY);
                }
            }

            renderDigitalCaliper(value) {
                const cx = this.w / 2;
                const cy = this.h / 2;
                
                // Main body
                this.drawMetallicBackground(cx - 150, cy - 60, 300, 120, 10);
                
                // Screen Bezel
                this.ctx.fillStyle = '#334155';
                this.ctx.beginPath();
                this.ctx.roundRect(cx - 100, cy - 30, 200, 60, 5);
                this.ctx.fill();

                // Screen Background
                this.ctx.fillStyle = '#94a3b8'; // Off state color
                this.ctx.beginPath();
                this.ctx.roundRect(cx - 95, cy - 25, 190, 50, 3);
                this.ctx.fill();
                this.ctx.fillStyle = '#c0d4c8'; // LCD Green/Grey
                this.ctx.fill();

                // Display Value (Format to 2 decimals)
                let displayStr = value.toFixed(2);
                if (state.errorMode === 'zero') {
                    // Show a slightly wrong value if error mode is zero but not corrected yet
                    // Wait, the logic is: if error is zero, the user must spot it via an overlay, 
                    // but the display shows the measurement + zero offset.
                    displayStr = (value + state.zeroOffset).toFixed(2);
                }

                this.drawText(displayStr, cx + 60, cy, "40px 'Share Tech Mono'", "#1e293b", "right");
                this.drawText("mm", cx + 80, cy + 10, "16px Inter", "#1e293b", "left");
                
                // Zero button
                this.ctx.fillStyle = '#ef4444';
                this.ctx.beginPath();
                this.ctx.arc(cx - 120, cy + 15, 8, 0, Math.PI * 2);
                this.ctx.fill();
                this.drawText("ZERO", cx - 120, cy - 5, "10px Inter", "#334155");
            }

            renderMicrometer(value, showCorrection) {
                const cx = this.w / 2;
                const cy = this.h / 2;
                const scaleX = 25; // Spacing for 1mm on barrel
                const barrelW = 200;
                
                // Calculate display components
                const fullMm = Math.floor(value);
                const hasHalf = (value % 1) >= 0.5;
                const thimbleReading = (value % 0.5); // 0 to 0.49
                const thimbleGrads = thimbleReading / 0.01; // 0 to 49
                
                const viewStartMm = Math.max(0, fullMm - 5);
                
                // DRAW BARREL (Fixed, left side)
                const barrelX = cx - 100;
                this.drawMetallicBackground(barrelX, cy - 40, barrelW, 80, [10, 0, 0, 10]);
                
                // Center Line
                this.drawLine(barrelX, cy, barrelX + barrelW - 40, cy, '#000', 1.5);

                // Barrel Ticks (Top: 1mm, Bottom: 0.5mm)
                // Thimble position horizontally
                const thimbleX = barrelX + (value - viewStartMm) * scaleX;

                for(let i = viewStartMm; i <= viewStartMm + 10; i++) {
                    let px = barrelX + (i - viewStartMm) * scaleX;
                    if(px > thimbleX) break; // Hidden by thimble
                    
                    // Top (1mm marks)
                    this.drawLine(px, cy, px, cy - 15, '#000', i%5===0?1.5:1);
                    if(i % 5 === 0) this.drawText(i, px, cy - 25, "12px Inter");
                    
                    // Bottom (0.5mm marks)
                    let halfPx = px + scaleX/2;
                    if(halfPx <= thimbleX) {
                        this.drawLine(halfPx, cy, halfPx, cy + 15, '#000', 1);
                    }
                }

                if (state.errorMode === 'parallax') {
                    // Ombre portée du tambour sur la douille pour montrer l'angle oblique
                    this.ctx.fillStyle = 'rgba(0,0,0,0.25)';
                    this.ctx.beginPath();
                    this.ctx.ellipse(thimbleX, cy, 15, 45, 0, 0, Math.PI * 2);
                    this.ctx.fill();
                }

                // DRAW THIMBLE (Rotating, right side)
                this.drawMetallicBackground(thimbleX, cy - 50, this.w - thimbleX, 100, [5, 0, 0, 5]);
                // Thimble knurling effect
                for(let k=thimbleX+30; k<this.w; k+=10) {
                    this.drawLine(k, cy-50, k, cy+50, 'rgba(0,0,0,0.1)', 3);
                }
                
                // Bevel of thimble
                this.ctx.beginPath();
                this.ctx.moveTo(thimbleX, cy - 50);
                this.ctx.lineTo(thimbleX + 15, cy - 40);
                this.ctx.lineTo(thimbleX + 15, cy + 40);
                this.ctx.lineTo(thimbleX, cy + 50);
                this.ctx.fillStyle = '#e2e8f0';
                this.ctx.fill();
                this.ctx.stroke();

                // Thimble Graduations (0 to 49)
                // We draw an unrolled projection. Center is `thimbleGrads`.
                for(let i = -15; i <= 15; i++) {
                    let mark = Math.round(thimbleGrads) + i;
                    // Handle wrap around
                    let displayMark = mark;
                    while(displayMark < 0) displayMark += 50;
                    while(displayMark >= 50) displayMark -= 50;

                    let yOffset = i * 6; // pixels per graduation vertically
                    
                    // Perspective effect: squeeze lines near edges
                    let perspectiveFactor = Math.cos(i / 15 * Math.PI / 2);
                    if(perspectiveFactor < 0.1) continue;
                    
                    let yPos = cy - (i * 10 * perspectiveFactor);
                    if(yPos < cy - 45 || yPos > cy + 45) continue;

                    let isMain = displayMark % 5 === 0;
                    this.drawLine(thimbleX, yPos, thimbleX + (isMain ? 15 : 10), yPos, '#000', isMain?1.5:1);
                    
                    if(isMain) {
                        this.drawText(displayMark, thimbleX + 25, yPos, "12px Inter", "#000", "left");
                    }

                    // Correction
                    if (showCorrection && i === 0) { // Center line
                        this.drawLine(barrelX, cy, thimbleX + 30, cy, '#22c55e', 2);
                        this.ctx.beginPath();
                        this.ctx.arc(thimbleX + 15, cy, 4, 0, Math.PI*2);
                        this.ctx.fillStyle = '#22c55e';
                        this.ctx.fill();
                    }
                }
            }

            renderDial(value, showCorrection) {
                const cx = this.w / 2;
                const cy = this.h / 2;
                const radius = Math.min(this.w, this.h) / 2 - 20;
                
                // Value breakdown
                const mmWhole = Math.floor(value);
                const hundredths = (value % 1) * 100;
                
                // Outer Bezel
                this.ctx.beginPath();
                this.ctx.arc(cx, cy, radius + 10, 0, Math.PI * 2);
                this.ctx.fillStyle = '#94a3b8';
                this.ctx.fill();
                this.ctx.lineWidth = 4;
                this.ctx.strokeStyle = '#475569';
                this.ctx.stroke();

                // Dial Face
                this.ctx.beginPath();
                this.ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                this.ctx.fillStyle = '#f8fafc';
                this.ctx.fill();

                // Outer Ticks (100 divisions)
                for(let i=0; i<100; i++) {
                    const angle = (i / 100) * Math.PI * 2 - Math.PI / 2;
                    const rStart = i % 10 === 0 ? radius - 15 : (i % 5 === 0 ? radius - 10 : radius - 5);
                    const x1 = cx + Math.cos(angle) * rStart;
                    const y1 = cy + Math.sin(angle) * rStart;
                    const x2 = cx + Math.cos(angle) * radius;
                    const y2 = cy + Math.sin(angle) * radius;
                    
                    this.drawLine(x1, y1, x2, y2, '#1e293b', i % 10 === 0 ? 2 : 1);
                    
                    if(i % 10 === 0) {
                        const tx = cx + Math.cos(angle) * (radius - 25);
                        const ty = cy + Math.sin(angle) * (radius - 25);
                        this.drawText(i, tx, ty, "bold 14px Inter");
                    }
                }

                // Small Dial (mm counter) - offset upwards
                const smallR = radius * 0.3;
                const scx = cx;
                const scy = cy - radius * 0.4;
                
                this.ctx.beginPath();
                this.ctx.arc(scx, scy, smallR, 0, Math.PI * 2);
                this.ctx.fillStyle = '#fff';
                this.ctx.fill();
                this.ctx.stroke();

                for(let i=0; i<10; i++) {
                    const angle = (i / 10) * Math.PI * 2 - Math.PI / 2;
                    const x1 = scx + Math.cos(angle) * (smallR - 5);
                    const y1 = scy + Math.sin(angle) * (smallR - 5);
                    const x2 = scx + Math.cos(angle) * smallR;
                    const y2 = scy + Math.sin(angle) * smallR;
                    this.drawLine(x1, y1, x2, y2, '#1e293b', 1);
                    
                    if(i % 2 === 0) {
                        const tx = scx + Math.cos(angle) * (smallR - 12);
                        const ty = scy + Math.sin(angle) * (smallR - 12);
                        this.drawText(i, tx, ty, "10px Inter");
                    }
                }
                
                // Small Hand (Continuous movement)
                const smallHandAngle = ((value / 10) * Math.PI * 2) - Math.PI / 2;
                
                this.ctx.save();
                if(state.errorMode === 'parallax') {
                    this.ctx.shadowColor = 'rgba(0,0,0,0.4)';
                    this.ctx.shadowBlur = 4;
                    this.ctx.shadowOffsetX = 6;
                    this.ctx.shadowOffsetY = 8;
                }
                this.drawHand(scx, scy, smallR - 2, smallHandAngle, '#ef4444', 2);
                this.ctx.restore();

                // Large Hand
                const largeHandAngle = ((hundredths / 100) * Math.PI * 2) - Math.PI / 2;
                
                this.ctx.save();
                if(state.errorMode === 'parallax') {
                    this.ctx.shadowColor = 'rgba(0,0,0,0.4)';
                    this.ctx.shadowBlur = 6;
                    this.ctx.shadowOffsetX = 12;
                    this.ctx.shadowOffsetY = 16;
                } else {
                    this.ctx.shadowColor = 'rgba(0,0,0,0.1)';
                    this.ctx.shadowBlur = 3;
                    this.ctx.shadowOffsetY = 3;
                }
                this.drawHand(cx, cy, radius - 5, largeHandAngle, '#1e293b', 3);
                this.ctx.restore();

                // Center Pin
                this.ctx.beginPath();
                this.ctx.arc(cx, cy, 5, 0, Math.PI * 2);
                this.ctx.fillStyle = '#1e293b';
                this.ctx.fill();

                if (showCorrection) {
                    // Highlight the read value on outer dial
                    const arcEnd = largeHandAngle;
                    this.ctx.beginPath();
                    this.ctx.arc(cx, cy, radius - 35, -Math.PI/2, arcEnd, hundredths > 50);
                    this.ctx.strokeStyle = 'rgba(34, 197, 94, 0.3)';
                    this.ctx.lineWidth = 10;
                    this.ctx.stroke();
                }
            }

            drawHand(cx, cy, length, angle, color, width) {
                const tail = length * 0.2;
                this.ctx.beginPath();
                this.ctx.moveTo(cx - Math.cos(angle) * tail, cy - Math.sin(angle) * tail);
                this.ctx.lineTo(cx + Math.cos(angle) * length, cy + Math.sin(angle) * length);
                this.ctx.strokeStyle = color;
                this.ctx.lineWidth = width;
                this.ctx.stroke();
            }

            renderBlocks(value) {
                // Determine composition (e.g., 2-3 blocks)
                const cx = this.w / 2;
                const cy = this.h / 2;
                
                // Simple stack visualization
                let blocks = [];
                let remain = value;
                // Fake standard breakdown for visual
                if (remain > 20) { blocks.push(20); remain -= 20; }
                if (remain > 10) { blocks.push(10); remain -= 10; }
                if (remain > 0) { blocks.push(parseFloat(remain.toFixed(3))); }

                let currentY = cy + 50;
                blocks.sort((a,b) => b-a).forEach((v) => {
                    const h = Math.max(20, v * 2); // Visual height based on value
                    currentY -= h;
                    this.drawMetallicBackground(cx - 40, currentY, 80, h, 2);
                    this.drawText(v.toFixed(3) + " mm", cx, currentY + h/2, "bold 12px Inter", "#0f172a");
                });

                if(state.errorMode === 'dirt') {
                    this.drawDirt(cx - 20, cy - 10);
                }
            }

            renderGauges(value) {
                const cx = this.w / 2;
                const cy = this.h / 2;
                
                // Draw a fan of gauge blades, highlight the selected one
                for(let i=0; i<5; i++) {
                    const angle = (i - 2) * 15 * Math.PI / 180;
                    this.ctx.save();
                    this.ctx.translate(cx, cy + 100);
                    this.ctx.rotate(angle);
                    
                    // Blade
                    this.drawMetallicBackground(-15, -150, 30, 160, 15);
                    
                    // Text
                    this.ctx.rotate(-Math.PI/2);
                    let textVal = (value + (i-2)*0.05).toFixed(2);
                    if(i === 2) textVal = value.toFixed(2); // The focus blade
                    
                    this.drawText(textVal, 80, 0, i===2 ? "bold 16px Inter" : "12px Inter", i===2 ? "#2563eb" : "#64748b");
                    
                    if(state.errorMode === 'dirt' && i === 2) {
                        this.drawDirt(60, 0);
                    }
                    
                    this.ctx.restore();
                }
            }

            renderProtractor(value, showCorrection) {
                // Universal Bevel Protractor (Zoomed view of scale)
                const cx = this.w / 2;
                const cy = this.h + 100; // Center is far below
                const rMain = 300;
                const rVernier = 280;

                const wholeDegrees = Math.floor(value);
                const minutes = Math.round((value % 1) * 60);

                // Main Scale
                this.ctx.beginPath();
                this.ctx.arc(cx, cy, rMain, -Math.PI, 0);
                this.ctx.lineWidth = 40;
                this.ctx.strokeStyle = '#e2e8f0';
                this.ctx.stroke();

                // Draw Ticks
                const deg2Rad = Math.PI / 180;
                for(let d = wholeDegrees - 15; d <= wholeDegrees + 15; d++) {
                    // Map visual angle to screen
                    const a = -Math.PI/2 + (d - value) * deg2Rad * 4; // Zoom factor 4
                    if (a < -Math.PI || a > 0) continue;

                    const x1 = cx + Math.cos(a) * rMain;
                    const y1 = cy + Math.sin(a) * rMain;
                    const x2 = cx + Math.cos(a) * (rMain + (d%5===0?15:8));
                    const y2 = cy + Math.sin(a) * (rMain + (d%5===0?15:8));
                    this.drawLine(x1, y1, x2, y2, '#000', d%10===0?2:1);

                    if(d%10===0) {
                        this.drawText(Math.abs(d), cx + Math.cos(a) * (rMain + 25), cy + Math.sin(a) * (rMain + 25));
                    }
                }

                // Vernier Scale (Below)
                this.ctx.beginPath();
                this.ctx.arc(cx, cy, rVernier, -Math.PI, 0);
                
                this.ctx.save();
                if (state.errorMode === 'parallax') {
                    this.ctx.shadowColor = 'rgba(0,0,0,0.4)';
                    this.ctx.shadowBlur = 8;
                    this.ctx.shadowOffsetX = 0;
                    this.ctx.shadowOffsetY = -15; // Ombre vers le haut indiquant un angle de vue abaissé
                }
                this.ctx.lineWidth = 20;
                this.ctx.strokeStyle = '#cbd5e1';
                this.ctx.stroke();
                this.ctx.restore();

                // Vernier marks (60 minutes spread over 23 degrees. 1 div = 1°55')
                const vernier0Angle = -Math.PI/2; 
                for(let i = 0; i <= 12; i++) {
                    // Vernier scale in this zoomed proj
                    // Actual reading matches when i * 5 minutes aligns.
                    const a = vernier0Angle + (i * (23/12)) * deg2Rad * 4;
                    const x1 = cx + Math.cos(a) * rVernier;
                    const y1 = cy + Math.sin(a) * rVernier;
                    const x2 = cx + Math.cos(a) * (rVernier - (i%3===0?10:5));
                    const y2 = cy + Math.sin(a) * (rVernier - (i%3===0?10:5));
                    this.drawLine(x1, y1, x2, y2, '#000', 1);

                    if(i%3===0) {
                        this.drawText(i*5, cx + Math.cos(a) * (rVernier - 18), cy + Math.sin(a) * (rVernier - 18), "10px Inter");
                    }

                    // Highlight alignment
                    if(showCorrection && Math.round(minutes/5) === i) {
                        this.drawLine(x1, y1-30, x2, y2+10, '#22c55e', 2);
                    }
                    
                    if(state.errorMode === 'dirt' && Math.round(minutes/5) === i) {
                        this.drawDirt(x2, y2);
                    }
                }
            }

            drawDirt(x, y) {
                this.ctx.save();
                this.ctx.fillStyle = 'rgba(45, 35, 20, 0.9)'; // Couleur cambouis/huile
                this.ctx.filter = 'blur(1px)';
                this.ctx.beginPath();
                // Forme organique et irrégulière
                this.ctx.arc(x, y, 9, 0, Math.PI*2);
                this.ctx.arc(x+7, y-4, 6, 0, Math.PI*2);
                this.ctx.arc(x-6, y+5, 8, 0, Math.PI*2);
                this.ctx.arc(x+3, y+7, 5, 0, Math.PI*2);
                this.ctx.fill();
                this.ctx.restore();
            }
        }

        const app = {
            engine: null,

            init() {
                // Build UI
                this.buildInstrumentList();
                
                // Initialize Engine
                const dpr = window.devicePixelRatio || 1;
                const rect = canvas.parentElement.getBoundingClientRect();
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
                ctx.scale(dpr, dpr);
                this.engine = new RenderEngine(ctx, rect.width, rect.height);
                
                // Setup Event Listeners
                document.getElementById('input-value').addEventListener('keypress', (e) => {
                    if(e.key === 'Enter') this.validateAnswer();
                });

                this.setInstrument('vernier');
            },

            buildInstrumentList() {
                const list = document.getElementById('instrument-list');
                list.innerHTML = '';
                Object.values(INSTRUMENTS).forEach(inst => {
                    const btn = document.createElement('button');
                    btn.className = `instrument-btn w-full text-left px-4 py-3 rounded-lg border border-transparent hover:bg-slate-100 transition-colors mb-1 text-sm font-medium flex items-center gap-3`;
                    btn.onclick = () => this.setInstrument(inst.id);
                    btn.id = `nav-${inst.id}`;
                    
                    let icon = 'ruler';
                    if(inst.id === 'micrometer') icon = 'c-uttlefish'; // Approximate
                    if(inst.id === 'dial') icon = 'tachometer-alt';
                    if(inst.id === 'blocks') icon = 'cubes';
                    if(inst.id === 'gauges') icon = 'layer-group';
                    if(inst.id === 'protractor') icon = 'compass';

                    btn.innerHTML = `<i class="fas fa-${icon} text-slate-400 w-5 text-center"></i> ${inst.name}`;
                    list.appendChild(btn);
                });
            },

            setMode(mode) {
                state.mode = mode;
                document.getElementById('mode-training').className = mode === 'training' ? "px-4 py-1.5 rounded-md text-sm font-medium transition-colors bg-blue-500 text-white" : "px-4 py-1.5 rounded-md text-sm font-medium text-slate-300 hover:text-white transition-colors";
                document.getElementById('mode-evaluation').className = mode === 'evaluation' ? "px-4 py-1.5 rounded-md text-sm font-medium transition-colors bg-blue-500 text-white" : "px-4 py-1.5 rounded-md text-sm font-medium text-slate-300 hover:text-white transition-colors";
                
                document.getElementById('eval-score-container').classList.toggle('hidden', mode !== 'evaluation');
                
                if (mode === 'evaluation') {
                    state.evalScore = 0;
                    state.evalCurrentQ = 0;
                    this.updateScore();
                }
                
                this.generateNewMeasurement();
            },

            setInstrument(id) {
                state.currentInst = id;
                const inst = INSTRUMENTS[id];
                
                // Update UI Navigation
                document.querySelectorAll('.instrument-btn').forEach(b => {
                    b.classList.remove('active', 'bg-blue-50', 'border-blue-200', 'text-blue-700');
                    b.querySelector('i').classList.remove('text-blue-500');
                    b.querySelector('i').classList.add('text-slate-400');
                });
                const activeBtn = document.getElementById(`nav-${id}`);
                activeBtn.classList.add('active', 'bg-blue-50', 'border-blue-200', 'text-blue-700');
                activeBtn.querySelector('i').classList.remove('text-slate-400');
                activeBtn.querySelector('i').classList.add('text-blue-500');

                // Update Titles
                document.getElementById('current-instrument-title').textContent = inst.name;
                document.getElementById('current-instrument-desc').textContent = inst.desc;

                // Update Form Selects
                const resSelect = document.getElementById('input-resolution');
                resSelect.innerHTML = inst.resolutions.map(r => `<option value="${r}">${r}</option>`).join('');
                
                const unitSelect = document.getElementById('input-unit');
                unitSelect.innerHTML = inst.units.map(u => `<option value="${u}">${u === 'deg' ? 'Degrés' : u}</option>`).join('');

                this.generateNewMeasurement();
            },

            generateNewMeasurement() {
                const inst = INSTRUMENTS[state.currentInst];
                const range = inst.range;
                
                // Reset UI
                document.getElementById('input-value').value = '';
                document.getElementById('input-error').value = 'none';
                document.getElementById('feedback-panel').classList.add('hidden');
                document.getElementById('btn-next').classList.add('hidden');
                state.showCorrectionOverlay = false;

                // Pick Resolution
                state.resolution = inst.resolutions[Math.floor(Math.random() * inst.resolutions.length)];
                
                // Generate Value based on resolution precision
                const rawVal = range[0] + Math.random() * (range[1] - range[0]);
                // Snap to resolution
                state.targetValue = Math.round(rawVal / state.resolution) * state.resolution;
                // Fix floating point math issues
                state.targetValue = parseFloat(state.targetValue.toFixed(4));
                
                // Determine Error Mode (20% chance in training, 10% in eval)
                state.errorMode = 'none';
                document.getElementById('canvas-overlay').innerHTML = ''; // Clear overlay

                const errorChance = state.mode === 'training' ? 0.25 : 0.15;
                if(Math.random() < errorChance && inst.errors.length > 1) {
                    const validErrors = inst.errors.filter(e => e !== 'none');
                    state.errorMode = validErrors[Math.floor(Math.random() * validErrors.length)];
                }

                // If resolution select has multiple, pick the correct one in eval? No, user must pick it.
                // In training, maybe default it? Let's leave user choice.
                if(state.mode === 'evaluation') {
                    document.getElementById('input-resolution').selectedIndex = 0; // Reset
                } else {
                    document.getElementById('input-resolution').value = state.resolution; // Helper for training
                }

                this.render();
            },

            render() {
                if(!this.engine) return;
                
                // Fix dimensions on render to prevent scaling issues
                const rect = canvas.parentElement.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                this.engine.w = rect.width;
                this.engine.h = rect.height;
                
                this.engine.clear();

                const valToRender = state.targetValue;
                const inst = state.currentInst;

                switch(inst) {
                    case 'vernier': this.engine.renderVernier(valToRender, state.resolution, state.showCorrectionOverlay); break;
                    case 'digital_caliper': this.engine.renderDigitalCaliper(valToRender); break;
                    case 'micrometer': this.engine.renderMicrometer(valToRender, state.showCorrectionOverlay); break;
                    case 'dial': this.engine.renderDial(valToRender, state.showCorrectionOverlay); break;
                    case 'protractor': this.engine.renderProtractor(valToRender, state.showCorrectionOverlay); break;
                    case 'blocks': this.engine.renderBlocks(valToRender); break;
                    case 'gauges': this.engine.renderGauges(valToRender); break;
                }
            },

            validateAnswer() {
                const userValStr = document.getElementById('input-value').value;
                if(!userValStr) return; // Ignore empty

                // Parse standard number and replace comma if French format
                const userVal = parseFloat(userValStr.replace(',', '.'));
                const userUnit = document.getElementById('input-unit').value;
                const userRes = parseFloat(document.getElementById('input-resolution').value);
                const userError = document.getElementById('input-error').value;

                // Tolerance for floating points
                const valCorrect = Math.abs(userVal - state.targetValue) < 0.0001;
                
                // In training mode, resolution might be pre-selected. In eval, must be strictly correct.
                const resCorrect = Math.abs(userRes - state.resolution) < 0.0001;
                const errorCorrect = (userError === state.errorMode);

                const isFullyCorrect = valCorrect && resCorrect && errorCorrect;

                this.showFeedback(isFullyCorrect, valCorrect, resCorrect, errorCorrect);

                if(state.mode === 'evaluation') {
                    if(isFullyCorrect) state.evalScore++;
                    state.evalCurrentQ++;
                    this.updateScore();
                    
                    if(state.evalCurrentQ >= state.evalMaxQ) {
                        this.endEvaluation();
                    }
                }
            },

            showFeedback(isSuccess, valC, resC, errC) {
                const panel = document.getElementById('feedback-panel');
                const icon = document.getElementById('feedback-icon');
                const title = document.getElementById('feedback-title');
                const msg = document.getElementById('feedback-message');
                const detailed = document.getElementById('detailed-correction');
                const btnNext = document.getElementById('btn-next');

                panel.classList.remove('hidden', 'bg-red-50', 'bg-green-50', 'border-red-200', 'border-green-200');
                
                state.showCorrectionOverlay = true; // Turn on canvas highlights
                this.render();

                if(isSuccess) {
                    panel.classList.add('bg-green-50', 'border-green-200');
                    icon.className = 'w-12 h-12 rounded-full flex items-center justify-center text-2xl flex-shrink-0 bg-green-100 text-green-600';
                    icon.innerHTML = '<i class="fas fa-check"></i>';
                    title.className = 'text-lg font-bold mb-1 text-green-800';
                    title.textContent = 'Excellent !';
                    msg.textContent = 'La lecture, la résolution et l\'identification des erreurs sont correctes.';
                    detailed.classList.add('hidden');
                } else {
                    panel.classList.add('bg-red-50', 'border-red-200');
                    icon.className = 'w-12 h-12 rounded-full flex items-center justify-center text-2xl flex-shrink-0 bg-red-100 text-red-600';
                    icon.innerHTML = '<i class="fas fa-times"></i>';
                    title.className = 'text-lg font-bold mb-1 text-red-800';
                    title.textContent = 'Erreur détectée';
                    
                    let errStr = [];
                    if(!valC) errStr.push(`La valeur attendue était <b>${state.targetValue}</b>.`);
                    if(!resC) errStr.push(`La résolution est de <b>${state.resolution}</b>.`);
                    if(!errC) errStr.push(state.errorMode === 'none' ? 'Il n\'y avait aucune erreur sur l\'instrument.' : `Il fallait détecter l'erreur : <b>${document.querySelector(`#input-error option[value="${state.errorMode}"]`).text}</b>.`);
                    
                    msg.innerHTML = errStr.join('<br>');
                    
                    // Show detailed correction for complex instruments
                    this.buildDetailedCorrection(detailed);
                }

                btnNext.classList.remove('hidden');
                btnNext.scrollIntoView({ behavior: 'smooth', block: 'end' });
            },

            buildDetailedCorrection(container) {
                container.classList.remove('hidden');
                let html = '<h4 class="font-bold text-slate-700 mb-2"><i class="fas fa-microscope mr-2"></i>Détail de la lecture :</h4><ul class="list-disc pl-5 space-y-1">';
                
                const val = state.targetValue;
                
                if (state.currentInst === 'vernier') {
                    const mainLec = Math.floor(val);
                    const vernierLec = (val % 1).toFixed(2);
                    html += `<li>Lecture sur l'échelle principale (repère 0 du vernier) : <b>${mainLec} mm</b></li>`;
                    html += `<li>Le trait du vernier qui s'aligne parfaitement est le <b>${Math.round((val % 1) / state.resolution)}e</b> trait.</li>`;
                    html += `<li>Lecture sur le vernier : ${Math.round((val % 1) / state.resolution)} × ${state.resolution} = <b>${vernierLec} mm</b></li>`;
                    html += `<li class="font-semibold text-blue-700 mt-2">Total = ${mainLec} + ${vernierLec} = ${val.toFixed(2)} mm</li>`;
                } else if (state.currentInst === 'micrometer') {
                    const fullMm = Math.floor(val);
                    const hasHalf = (val % 1) >= 0.5;
                    const thimble = (val % 0.5).toFixed(2);
                    html += `<li>Lecture sur la douille (haut) : <b>${fullMm} mm</b></li>`;
                    if(hasHalf) html += `<li>Trait de 0.5mm visible sur la douille (bas) : <b>+ 0.50 mm</b></li>`;
                    html += `<li>Lecture sur le tambour (alignement horizontal) : <b>+ ${thimble} mm</b></li>`;
                    html += `<li class="font-semibold text-blue-700 mt-2">Total = ${fullMm} ${hasHalf ? '+ 0.5 ' : ''}+ ${thimble} = ${val.toFixed(2)} mm</li>`;
                } else if (state.currentInst === 'dial') {
                    html += `<li>Le petit cadran indique les millimètres entiers : <b>${Math.floor(val)} mm</b></li>`;
                    html += `<li>Le grand cadran indique les centièmes : <b>${((val%1)*100).toFixed(0)}</b> graduations.</li>`;
                    html += `<li class="font-semibold text-blue-700 mt-2">Total = ${val.toFixed(2)} mm</li>`;
                } else {
                    html += `<li>Lecture directe = <b>${val}</b></li>`;
                }

                html += '</ul>';
                container.innerHTML = html;
            },

            nextStep() {
                if(state.mode === 'evaluation' && state.evalCurrentQ >= state.evalMaxQ) {
                    this.endEvaluation();
                } else {
                    this.generateNewMeasurement();
                }
            },

            updateScore() {
                document.getElementById('eval-score').textContent = `${state.evalScore} / ${state.evalMaxQ}`;
            },

            endEvaluation() {
                const pct = (state.evalScore / state.evalMaxQ) * 100;
                let msg = pct >= 80 ? 'Excellent travail ! Vous maîtrisez la lecture.' : 
                          pct >= 50 ? 'Bon début, mais encore un peu de pratique nécessaire.' : 
                          'Revenez en mode Entraînement pour consolider vos bases.';

                document.getElementById('render-canvas').style.display = 'none';
                document.getElementById('canvas-overlay').innerHTML = `
                    <div class="absolute inset-0 flex flex-col items-center justify-center bg-white/90 backdrop-blur z-20 rounded-xl p-8 text-center border border-slate-200">
                        <i class="fas fa-trophy text-6xl text-yellow-400 mb-4 drop-shadow-md"></i>
                        <h2 class="text-3xl font-bold text-slate-800 mb-2">Évaluation terminée</h2>
                        <p class="text-xl text-slate-600 mb-6">Votre score : <span class="font-bold text-blue-600">${state.evalScore} / ${state.evalMaxQ}</span></p>
                        <p class="text-slate-500 mb-8 max-w-md">${msg}</p>
                        <button onclick="app.setMode('training'); document.getElementById('render-canvas').style.display = 'block';" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-lg shadow transition-colors">
                            Retour à l'entraînement
                        </button>
                    </div>
                `;
            }
        };

        // Initialize App when DOM is ready
        window.addEventListener('DOMContentLoaded', () => {
            app.init();
        });

    </script>
</body>
